<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-apple-bg px-6">
  
  <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-400/20 rounded-full blur-[100px] animate-fluid"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-purple-400/20 rounded-full blur-[100px] animate-fluid" style="animation-delay: -5s"></div>

  <div class="z-10 w-full max-w-sm p-8 bg-white/40 backdrop-blur-[30px] border border-white/30 rounded-apple-xl shadow-skeuo">
    
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold tracking-tighter text-apple-text">Serve<span class="text-apple-blue">X</span></h1>
      <p class="text-apple-text/50 text-sm mt-2 font-medium">Digital Craftsmanship</p>
    </div>

    <div class="space-y-4">
      <div class="space-y-1">
        <input type="email" placeholder="Email Address" 
          class="w-full px-5 py-4 rounded-2xl bg-white/50 border-none ring-1 ring-black/5 focus:ring-2 focus:ring-apple-blue transition-all outline-none text-apple-text placeholder:text-black/30">
      </div>
      
      <div class="space-y-1">
        <input type="password" placeholder="Password" 
          class="w-full px-5 py-4 rounded-2xl bg-white/50 border-none ring-1 ring-black/5 focus:ring-2 focus:ring-apple-blue transition-all outline-none text-apple-text placeholder:text-black/30">
      </div>

      <button class="w-full py-4 mt-4 bg-apple-blue text-white rounded-full font-semibold shadow-lg hover:brightness-110 active:scale-95 transition-all">
        Sign In
      </button>

      <div class="relative py-4 flex items-center">
        <div class="flex-grow border-t border-black/5"></div>
        <span class="px-4 text-xs font-semibold text-black/20 uppercase tracking-widest">Or</span>
        <div class="flex-grow border-t border-black/5"></div>
      </div>

      <button class="w-full py-4 bg-white/60 text-apple-text border border-white/20 rounded-full font-semibold shadow-sm flex items-center justify-center space-x-2 hover:bg-white/80 transition-all active:scale-95">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
        <span>Continue with Apple ID</span>
      </button>
    </div>

    <p class="text-center mt-8 text-sm text-black/40 font-medium">
      New to ServeX? <a routerLink="/register" class="text-apple-blue font-bold">Create Account</a>
    </p>
  </div>
</div>

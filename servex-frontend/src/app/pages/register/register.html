<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-[#f5f5f7] px-6">
  
  <div class="absolute top-[-5%] right-[-5%] w-[550px] h-[550px] bg-blue-400/20 rounded-full blur-[100px] animate-fluid"></div>
  <div class="absolute bottom-[-5%] left-[-5%] w-[550px] h-[550px] bg-purple-400/20 rounded-full blur-[100px] animate-fluid" style="animation-delay: -3s"></div>

  <div class="z-10 w-full max-w-sm p-8 bg-white/40 backdrop-blur-[30px] border border-white/30 rounded-[2.5rem] shadow-[inset_0_1px_1px_rgba(255,255,255,0.4),_0_10px_20px_rgba(0,0,0,0.05)]">
    
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold tracking-tighter text-[#1d1d1f]">Serve<span class="text-[#0071e3]">X</span></h1>
      <p class="text-[#1d1d1f]/50 text-sm mt-2 font-medium">Create Your Digital Identity</p>
    </div>

    <form class="space-y-4">
      <input type="text" placeholder="Full Name" 
        class="w-full px-5 py-4 rounded-2xl bg-white/50 border-none ring-1 ring-black/5 focus:ring-2 focus:ring-[#0071e3] transition-all outline-none text-[#1d1d1f] placeholder:text-black/30">
      
      <input type="email" placeholder="Email Address" 
        class="w-full px-5 py-4 rounded-2xl bg-white/50 border-none ring-1 ring-black/5 focus:ring-2 focus:ring-[#0071e3] transition-all outline-none text-[#1d1d1f] placeholder:text-black/30">
      
      <input type="password" placeholder="Password" 
        class="w-full px-5 py-4 rounded-2xl bg-white/50 border-none ring-1 ring-black/5 focus:ring-2 focus:ring-[#0071e3] transition-all outline-none text-[#1d1d1f] placeholder:text-black/30">

      <button class="w-full py-4 mt-4 bg-[#0071e3] text-white rounded-full font-semibold shadow-lg hover:brightness-110 active:scale-95 transition-all">
        Create Account
      </button>

      <div class="relative py-4 flex items-center">
        <div class="flex-grow border-t border-black/5"></div>
        <span class="px-4 text-xs font-semibold text-black/20 uppercase tracking-widest">Or</span>
        <div class="flex-grow border-t border-black/5"></div>
      </div>

      <button class="w-full py-4 bg-white/60 text-[#1d1d1f] border border-white/20 rounded-full font-semibold shadow-sm flex items-center justify-center space-x-2 hover:bg-white/80 transition-all active:scale-95">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
        <span>Sign up with Apple ID</span>
      </button>
    </form>

    <p class="text-center mt-8 text-sm text-black/40 font-medium">
      Already have an account? <a routerLink="/login" class="text-[#0071e3] font-bold">Sign In</a>
    </p>
  </div>
</div>
